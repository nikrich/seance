# Séance workspace config — copy to ~/seance/<workspace>/config.yaml and edit.
workspace: my-workspace

# Repos this workspace orchestrates ("teams"). Clones live at repos/<name>/.
repos:
  example-repo:
    url: git@github.com:you/example-repo.git
    default_branch: main
    # integration: how approved stories land.
    #   merge      — critic merges --no-ff into default_branch (local/unprotected repos)
    #   pr         — critic opens a PR per story (protected repos, max human control)
    #   feature-pr — RECOMMENDED for feature autonomy: stories merge automatically
    #                into a per-requirement branch (seance/<req-id>); ONE PR to
    #                default_branch when the whole requirement is done.
    integration: pr
    # Full test suite command, run from repo root. Critic runs this on every verdict;
    # planner bases story oracles on it.
    test_command: npm test

# Directories the manager drains alongside inbox/, for requirements published
# by other tools (the outbox contract: *.md files with id/title/category
# frontmatter). Claimed files are moved into inbox/ atomically; a claims/
# receipt records who took them. Optional — omit or point at nonexistent
# dirs and draining is skipped silently.
# inbox_feeds:
#   - ~/ouija/outbox

# Concurrency limits (enforced by the manager tick).
max_builders: 3
max_critics: 2
max_planner: 1

# Agents running longer than this are killed and their story requeued.
max_agent_minutes: 45

# After this many rejected attempts a story goes to `blocked` + attention/.
attempt_cap: 3

# Model per role (claude CLI aliases). Judgment roles get the strong model.
# The manager tick carries real routing logic (spec gate, dep eligibility,
# question lifecycle) — haiku has been observed spawning builders whose deps
# weren't ready; sonnet is the safe default.
models:
  manager: sonnet
  planner: opus
  builder: sonnet
  critic: opus

# Seconds the heartbeat sleeps between ticks (manager writes next-sleep from these).
sleep:
  active: 60
  idle: 600
