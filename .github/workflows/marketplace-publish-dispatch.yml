name: Marketplace Publish Dispatch

on:
  push:
    branches: [main]
    paths:
      - poltergeist-plugin/manifest.json

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch to poltergeist-plugins
        run: |
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SEANCE_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/nikrich/poltergeist-plugins/dispatches \
            -d '{"event_type":"seance-manifest-updated"}'
