name: Marketplace Publish Dispatch

on:
  push:
    branches: [main]
    paths:
      - poltergeist-plugin/manifest.json

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fire repository_dispatch to poltergeist-plugins
        env:
          SEANCE_DISPATCH_TOKEN: ${{ secrets.SEANCE_DISPATCH_TOKEN }}
        run: .github/scripts/marketplace-dispatch.sh
